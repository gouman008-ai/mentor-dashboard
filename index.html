<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Dashboard</title>

<style>
:root {
    --bg: linear-gradient(135deg, #0f172a, #1e293b);
    --card: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --accent: #38bdf8;
}

body.light {
    --bg: linear-gradient(135deg, #e0f2fe, #f8fafc);
    --card: rgba(255,255,255,0.7);
    --text: #0f172a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.5s;
    overflow-x: hidden;
}

/* animated background */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(56,189,248,0.2), transparent 40%);
    animation: moveBg 20s linear infinite;
    z-index: -2;
}

@keyframes moveBg {
    0% { transform: translate(0,0);} 
    50% { transform: translate(-10%,-10%);} 
    100% { transform: translate(0,0);} 
}

.container {
    max-width: 900px;
    margin: 60px auto;
    padding: 25px;
    background: var(--card);
    border-radius: 20px;
    backdrop-filter: blur(15px);
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

button {
    background: var(--accent);
    color: white;
    cursor: pointer;
}

button:hover { opacity: 0.8; }

.row { display: flex; gap: 10px; }
.row button { flex: 1; }

#output { white-space: pre-wrap; margin-top: 15px; }

footer { text-align:center; margin-top:15px; opacity:0.7; }

canvas { position: fixed; top:0; left:0; z-index:-1; }
</style>
</head>
<body>

<div style="position:absolute;top:20px;right:20px;cursor:pointer" onclick="toggleMode()">❄️</div>
<canvas id="snow"></canvas>

<div class="container">
<h2>❄️ Mentor Dashboard</h2>

<input id="reg" placeholder="Register Number">
<input id="name" placeholder="Student Name">
<input id="cat1" type="number" placeholder="CAT1">
<input id="cat2" type="number" placeholder="CAT2">
<input id="fat" type="number" placeholder="FAT">

<button onclick="addStudent()">Add Student</button>

<div class="row">
<button onclick="searchStudent()">Search</button>
<button onclick="updateStudent()">Update</button>
<button onclick="deleteStudent()">Delete</button>
</div>

<div class="row">
<button onclick="showTopper()">Topper</button>
<button onclick="showStats()">Stats</button>
<button onclick="gradeDist()">Grades</button>
</div>

<pre id="output"></pre>
<footer>Designed and Developed by Goutham ❄️</footer>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")||"[]");

function save(){ localStorage.setItem("students", JSON.stringify(students)); }

function computeGrade(avg){
    if(avg>=90) return "A";
    if(avg>=75) return "B";
    if(avg>=50) return "C";
    return "Fail";
}

function addStudent(){
    let reg=regVal(), name=nameVal();
    let cat1=num("cat1"), cat2=num("cat2"), fat=num("fat");

    if(students.find(s=>s.reg===reg)) return alert("Duplicate RegNo!");

    let total=cat1+cat2+fat;
    let avg=total/3;
    let grade=computeGrade(avg);

    students.push({reg,name,cat1,cat2,fat,total,avg,grade});
    save(); display();
}

function searchStudent(){
    let reg=regVal();
    let s=students.find(x=>x.reg===reg);
    out(s? JSON.stringify(s,null,2):"Not found");
}

function updateStudent(){
    let reg=regVal();
    let s=students.find(x=>x.reg===reg);
    if(!s) return alert("Not found");

    s.cat1=num("cat1");
    s.cat2=num("cat2");
    s.fat=num("fat");
    s.total=s.cat1+s.cat2+s.fat;
    s.avg=s.total/3;
    s.grade=computeGrade(s.avg);

    save(); display();
}

function deleteStudent(){
    let reg=regVal();
    if(!confirm("Delete?")) return;
    students=students.filter(s=>s.reg!==reg);
    save(); display();
}

function showTopper(){
    let max=Math.max(...students.map(s=>s.total));
    let top=students.filter(s=>s.total===max);
    out("Topper(s):\n"+JSON.stringify(top,null,2));
}

function showStats(){
    let totals=students.map(s=>s.total);
    let avg=totals.reduce((a,b)=>a+b,0)/totals.length||0;
    out(`High:${Math.max(...totals)} Low:${Math.min(...totals)} Avg:${avg.toFixed(2)}`);
}

function gradeDist(){
    let dist={A:0,B:0,C:0,Fail:0};
    students.forEach(s=>dist[s.grade]++);
    out(JSON.stringify(dist,null,2));
}

function display(){
    let t="";
    students.forEach(s=>t+=`${s.reg} | ${s.name} | ${s.total} | ${s.grade}\n`);
    out(t);
}

function out(t){ document.getElementById("output").innerText=t; }
function regVal(){ return document.getElementById("reg").value; }
function nameVal(){ return document.getElementById("name").value; }
function num(id){ return Number(document.getElementById(id).value); }

function toggleMode(){ document.body.classList.toggle("light"); }

// snow
const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth; canvas.height=innerHeight;
let snow=[];
for(let i=0;i<120;i++) snow.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*5});
function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 snow.forEach(f=>{ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fillStyle="white";ctx.fill(); f.y+=1; if(f.y>innerHeight) f.y=0;});
}
setInterval(draw,30);

display();
</script>

</body>
</html>
