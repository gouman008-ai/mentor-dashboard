<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentor Dashboard</title>

<style>
:root {
    --bg: linear-gradient(135deg, #0f172a, #1e293b);
    --card: rgba(255,255,255,0.08);
    --text: #e2e8f0;
    --accent: #38bdf8;
}

body.light {
    --bg: linear-gradient(135deg, #e0f2fe, #f8fafc);
    --card: rgba(255,255,255,0.7);
    --text: #0f172a;
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.5s;
    overflow-x: hidden;
}

.container {
    max-width: 800px;
    margin: 60px auto;
    padding: 25px;
    background: var(--card);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);} 
    to {opacity: 1; transform: translateY(0);} 
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    border: none;
    outline: none;
    font-size: 14px;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: white;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 5px 20px rgba(56,189,248,0.5);
}

#output {
    margin-top: 20px;
    white-space: pre-wrap;
}

.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 20px;
    cursor: pointer;
}

footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}


/* Animated gradient background */
body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 20% 20%, rgba(56,189,248,0.2), transparent 40%),
                radial-gradient(circle at 80% 30%, rgba(255,255,255,0.15), transparent 40%),
                radial-gradient(circle at 50% 80%, rgba(59,130,246,0.2), transparent 40%);
    animation: moveBg 20s linear infinite;
    z-index: -2;
}

@keyframes moveBg {
    0% { transform: translate(0,0); }
    50% { transform: translate(-10%, -10%); }
    100% { transform: translate(0,0); }
}

/* Soft glowing snow blur layer */
body::after {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(2px);
    z-index: -1;
}

</style>
</head>
<body>

<div class="toggle" onclick="toggleMode()">❄️</div>
<canvas id="snow"></canvas>

<div class="container">
    <h2>❄️ Student Performance System</h2>

    <input id="reg" placeholder="Register Number">
    <input id="name" placeholder="Student Name">
    <input id="cat1" type="number" placeholder="CAT 1">
    <input id="cat2" type="number" placeholder="CAT 2">
    <input id="fat" type="number" placeholder="FAT">

    <button onclick="addStudent()">Add Student</button>

    <h3>Records:</h3>
    <pre id="output"></pre>

    <footer>Designed and Developed by Goutham ❄️</footer>
</div>

<script>
let students = [];

function computeGrade(avg) {
    if (avg >= 90) return "A";
    else if (avg >= 75) return "B";
    else if (avg >= 50) return "C";
    else return "Fail";
}

function addStudent() {
    let reg = document.getElementById("reg").value;
    let name = document.getElementById("name").value;
    let cat1 = Number(document.getElementById("cat1").value);
    let cat2 = Number(document.getElementById("cat2").value);
    let fat = Number(document.getElementById("fat").value);

    if (!reg || !name) {
        alert("Enter all details");
        return;
    }

    if (cat1 < 0 || cat2 < 0 || fat < 0 || cat1 > 100 || cat2 > 100 || fat > 100) {
        alert("Marks must be 0–100");
        return;
    }

    let total = cat1 + cat2 + fat;
    let avg = total / 3;
    let grade = computeGrade(avg);

    students.push({ reg, name, total, avg, grade });

    display();
}

function display() {
    let text = "";
    students.forEach(s => {
        text += `${s.reg} | ${s.name} | Total: ${s.total} | Avg: ${s.avg.toFixed(2)} | Grade: ${s.grade}\n`;
    });
    document.getElementById("output").innerText = text;
}

function toggleMode() {
    document.body.classList.toggle("light");
}

// Advanced Snow Effect (snowballs + depth)
const canvas = document.getElementById("snow");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let snowflakes = [];

for (let i = 0; i < 150; i++) {
    snowflakes.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 6 + 1,
        d: Math.random() * 2
    });
}

function drawSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < snowflakes.length; i++) {
        let f = snowflakes[i];

        ctx.beginPath();
        ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(255,255,255,0.8)";
        ctx.fill();
    }

    moveSnow();
}

let angle = 0;

function moveSnow() {
    angle += 0.01;
    for (let i = 0; i < snowflakes.length; i++) {
        let f = snowflakes[i];
        f.y += f.d + 1;
        f.x += Math.sin(angle) * 1.5;

        if (f.y > canvas.height) {
            snowflakes[i] = { x: Math.random() * canvas.width, y: 0, r: f.r, d: f.d };
        }
    }
}

setInterval(drawSnow, 30);
</script>

</body>
</html>
